{% extends 'base.html' %}
{%block head%}
<title>Derm Detect</title>
<link rel="stylesheet" href="https:://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{%block body%}
<div>
    <h1 class="title">Upload the image of dog skin conditions for detection</h1>
</div>


<div class="detection-body">
    <!-- reference from youtube videos: https://www.youtube.com/watch?v=nYjYs3Z6YwQ&list=PPSV -->
    <div class="container">
        <div class="box">
            <div class="upload-box">
                <i class="fa fa-cloud-upload"></i>
                <h3>Drag and drop your image file here</h3>
                <h4>Only support image file: PNG, JPEG</h4>
                <span class="or">OR</span>
                    <div class="input-box">
                        <label for="click">
                            BROWSE FILE
                            
                        </label>
                        <input type="file" id="click" accept="image/jpeg, image/png">
                    </div>
                <span class="size">Maximun Size:5 MB</span>
            </div>

            <div class="imgbox">
                <div class="imgiconbox">
                    <i class="fa-solid fa-file"></i> 
                </div>

                <div class="info-box">
                    <p class="file-name">index.html</p>
                    <div class="file-size">1 mb</div>
                </div>

                <button class="iconbox">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>
    </div>

</div>

<div>
      <button class="predict_button" onclick="document.location='default.asp'">Predict</button>
</div>

<script src="{{url_for('static',filename='browseFile.js')}}"></script>
{% endblock %}
